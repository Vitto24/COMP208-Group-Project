{% extends 'base.html' %}

{% block title %}Settings — Uni Tracker{% endblock %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<section class="section">
    <h2>Profile Settings</h2>

    {% if messages %}
    <div class="form-messages">
        {% for message in messages %}
        <p class="{{ message.tags }}">{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name"
                   value="{{ request.user.first_name }}" required />
        </div>

        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name"
                   value="{{ request.user.last_name }}" required />
        </div>

        <div class="form-group">
            <label for="email">University Email</label>
            <input type="email" id="email" name="email"
                   value="{{ request.user.email }}" required />
        </div>

        <div class="form-group">
            <label for="course">Course</label>
            <select id="course" name="course">
                <option value="">-- No course selected --</option>
                {% for course in courses %}
                <option value="{{ course.id }}"
                    {% if profile.course_id == course.id %}selected{% endif %}>
                    {{ course.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="year_of_study">Year of Study</label>
            <select id="year_of_study" name="year_of_study">
                {% for y in year_choices %}
                <option value="{{ y }}"
                    {% if profile.year_of_study == y %}selected{% endif %}>
                    Year {{ y }}
                </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn">Save Changes</button>
    </form>
</section>
{% endblock %}
